name: Bug Report
description: Report a reproducible problem in ewf.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest command, test, or code sample that reproduces the issue.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Crate version or commit hash.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Format family, compression, segment count, and whether a shareable fixture exists.
