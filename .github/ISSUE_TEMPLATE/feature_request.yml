name: Feature Request
description: Propose a new format feature, API, or compatibility improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What workflow or compatibility gap does this solve?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Desired Behavior
      description: Describe the public behavior or API shape you want.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Compatibility Evidence
      description: Link format references, external tool behavior, or shareable fixtures when applicable.
